<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRUD Lista de Tarefas</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 20px;
      width: 400px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
    }

    button {
      padding: 10px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .add-btn {
      background-color: #28a745;
      color: white;
    }

    ul {
      list-style: none;
      margin-top: 20px;
      padding: 0;
    }

    li {
      background: #eee;
      padding: 10px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 5px;
    }

    .actions button {
      margin-left: 5px;
    }

    .edit-btn {
      background-color: #ffc107;
    }

    .delete-btn {
      background-color: #dc3545;
      color: white;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Lista de Tarefas</h1>

    <div class="input-area">
      <input type="text" id="taskInput" placeholder="Digite uma tarefa">
      <button class="add-btn" onclick="addTask()">Adicionar</button>
    </div>

    <ul id="taskList"></ul>
  </div>

  <script>
    let tasks = [];

    function renderTasks() {
      const taskList = document.getElementById("taskList");
      taskList.innerHTML = "";

      tasks.forEach((task, index) => {
        const li = document.createElement("li");

        li.innerHTML = `
          <span>${task}</span>

          <div class="actions">
            <button class="edit-btn" onclick="editTask(${index})">
              Editar
            </button>

            <button class="delete-btn" onclick="deleteTask(${index})">
              Excluir
            </button>
          </div>
        `;

        taskList.appendChild(li);
      });
    }

    function addTask() {
      const input = document.getElementById("taskInput");
      const task = input.value.trim();

      if (task !== "") {
        tasks.push(task);
        input.value = "";
        renderTasks();
      }
    }

    function editTask(index) {
      const newTask = prompt("Editar tarefa:", tasks[index]);

      if (newTask !== null && newTask.trim() !== "") {
        tasks[index] = newTask.trim();
        renderTasks();
      }
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      renderTasks();
    }
  </script>

</body>
</html>
